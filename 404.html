<!DOCTYPE html>
<html lang="en">
<head>

    min-height: 100vh;

    padding: 12px 26px;
    background: #f5a623;
    color: #1a2b2a;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
  }
  a:hover { background: #e0950b; }
</style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
